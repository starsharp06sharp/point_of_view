name: point_of_view
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  permission_handler: ^11.3.1
  photo_view: ^0.15.0
  shared_preferences: ^2.3.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/calculator_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/calculator_icon.png"
